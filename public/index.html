<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEM 장비 예약 시스템</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 1.3rem; font-weight: 600; }
    header .user-info { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; }
    header .user-info span { opacity: 0.85; }
    .header-btns { display: flex; gap: 8px; }
    .header-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .header-btn:hover { background: rgba(255,255,255,0.25); }
    .header-btn.active-tab { background: rgba(255,255,255,0.35); font-weight: 600; }

    /* ── Auth Forms ── */
    .auth-container {
      max-width: 420px;
      margin: 80px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .auth-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 32px 24px;
      text-align: center;
    }
    .auth-header h2 { font-size: 1.5rem; margin-bottom: 4px; }
    .auth-header p { opacity: 0.7; font-size: 0.9rem; }
    .auth-tabs { display: flex; border-bottom: 2px solid #eee; }
    .auth-tabs button {
      flex: 1; padding: 14px; border: none; background: white;
      cursor: pointer; font-size: 0.95rem; font-weight: 500; color: #888; transition: all 0.2s;
    }
    .auth-tabs button.active { color: #1a1a2e; border-bottom: 2px solid #1a1a2e; margin-bottom: -2px; }
    .auth-form { padding: 24px; display: none; }
    .auth-form.active { display: block; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; font-weight: 500; color: #555; }
    .form-group input, .form-group select {
      width: 100%; padding: 10px 12px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 0.95rem; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #1a1a2e; }
    .btn-primary {
      width: 100%; padding: 12px; background: #1a1a2e; color: white;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 500; cursor: pointer;
    }
    .btn-primary:hover { background: #16213e; }
    .pending-msg {
      padding: 24px; text-align: center; color: #e67e22; font-weight: 500;
      display: none; font-size: 0.95rem; line-height: 1.6;
    }

    /* ── Main Content ── */
    .main-container { max-width: 960px; margin: 24px auto; padding: 0 16px; }

    /* ── Usage Card ── */
    .usage-card {
      background: white; border-radius: 12px; padding: 20px 24px;
      margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .usage-card h3 { font-size: 0.95rem; color: #555; margin-bottom: 12px; }
    .usage-bar-wrap { background: #e9ecef; border-radius: 8px; height: 28px; overflow: hidden; position: relative; }
    .usage-bar { height: 100%; border-radius: 8px; transition: width 0.4s; background: linear-gradient(90deg, #27ae60, #2ecc71); }
    .usage-bar.warning { background: linear-gradient(90deg, #f39c12, #e67e22); }
    .usage-bar.danger { background: linear-gradient(90deg, #e74c3c, #c0392b); }
    .usage-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.8rem; font-weight: 600; color: #333; }
    .usage-detail { margin-top: 8px; font-size: 0.85rem; color: #777; }

    /* ── Week Nav ── */
    .week-nav {
      display: flex; align-items: center; justify-content: space-between;
      background: white; border-radius: 12px; padding: 14px 20px;
      margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .week-nav button { background: #f0f2f5; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
    .week-nav button:hover { background: #e0e3e8; }
    .week-nav .week-label { font-weight: 600; font-size: 1rem; }

    /* ── Calendar ── */
    .calendar { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
    .calendar-header { display: grid; grid-template-columns: 70px repeat(7, 1fr); background: #1a1a2e; color: white; }
    .calendar-header div { padding: 12px 8px; text-align: center; font-size: 0.85rem; font-weight: 500; }
    .calendar-header .date-num { font-size: 0.75rem; opacity: 0.7; margin-top: 2px; }
    .calendar-body { display: grid; grid-template-columns: 70px repeat(7, 1fr); }
    .time-label { padding: 4px 8px; text-align: right; font-size: 0.75rem; color: #999; border-right: 1px solid #eee; height: 48px; display: flex; align-items: flex-start; justify-content: flex-end; }
    .calendar-cell { height: 48px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; position: relative; cursor: pointer; }
    .calendar-cell:hover { background: #f8f9ff; }
    .calendar-cell.today { background: #f0f4ff; }
    .reservation-block { position: absolute; left: 2px; right: 2px; background: #3498db; color: white; border-radius: 4px; padding: 2px 6px; font-size: 0.7rem; overflow: hidden; cursor: pointer; z-index: 2; line-height: 1.3; }
    .reservation-block.mine { background: #2ecc71; }
    .reservation-block:hover { opacity: 0.9; }

    /* ── Modal ── */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: white; border-radius: 12px; width: 90%; max-width: 440px; box-shadow: 0 8px 30px rgba(0,0,0,0.2); overflow: hidden; }
    .modal-header { background: #1a1a2e; color: white; padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { font-size: 1.1rem; }
    .modal-close { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; opacity: 0.7; }
    .modal-close:hover { opacity: 1; }
    .modal-body { padding: 24px; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a2e; color: white; padding: 12px 24px; border-radius: 8px; font-size: 0.9rem; transition: transform 0.3s ease; z-index: 200; }
    .toast.error { background: #e74c3c; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .detail-info { margin-bottom: 12px; }
    .detail-info label { font-weight: 600; color: #555; font-size: 0.85rem; }
    .detail-info p { font-size: 1rem; margin-top: 2px; }
    .btn-danger { width: 100%; padding: 10px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-size: 0.95rem; cursor: pointer; margin-top: 8px; }
    .btn-danger:hover { background: #c0392b; }

    /* ── Admin Panel ── */
    .admin-panel { display: none !important; }
    .admin-panel.visible { display: block !important; }

    .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }
    .stat-card .stat-num { font-size: 2rem; font-weight: 700; color: #1a1a2e; }
    .stat-card .stat-label { font-size: 0.85rem; color: #888; margin-top: 4px; }
    .stat-card.alert .stat-num { color: #e74c3c; }

    .admin-section {
      background: white; border-radius: 12px; padding: 24px;
      margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .admin-section h3 { font-size: 1.1rem; margin-bottom: 16px; color: #1a1a2e; }

    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .admin-table th { background: #f8f9fa; padding: 10px 12px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #eee; }
    .admin-table td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
    .admin-table tr:hover { background: #fafbfc; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-approved { background: #d4edda; color: #155724; }
    .badge-admin { background: #cce5ff; color: #004085; }

    .btn-sm { padding: 5px 12px; border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-weight: 500; }
    .btn-approve { background: #27ae60; color: white; }
    .btn-approve:hover { background: #219a52; }
    .btn-reject { background: #e74c3c; color: white; margin-left: 6px; }
    .btn-reject:hover { background: #c0392b; }
    .btn-delete-res { background: #e74c3c; color: white; }
    .btn-delete-res:hover { background: #c0392b; }

    .filter-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: flex-end; }
    .filter-bar .form-group { margin-bottom: 0; flex: 1; min-width: 150px; }
    .filter-bar .btn-primary { width: auto; padding: 10px 20px; }

    /* Advisor usage list in admin */
    .advisor-usage-list { display: flex; flex-direction: column; gap: 10px; }
    .advisor-usage-item { display: flex; align-items: center; gap: 12px; }
    .advisor-usage-item .advisor-name { min-width: 80px; font-weight: 600; font-size: 0.9rem; }
    .advisor-usage-item .usage-bar-wrap { flex: 1; height: 22px; }
    .advisor-usage-item .usage-bar-label { min-width: 90px; text-align: right; font-size: 0.8rem; color: #666; }

    @media (max-width: 768px) {
      .calendar-header, .calendar-body { grid-template-columns: 50px repeat(7, 1fr); }
      .calendar-header div { font-size: 0.7rem; padding: 8px 4px; }
      .time-label { font-size: 0.65rem; padding: 2px 4px; }
      .stat-cards { grid-template-columns: repeat(2, 1fr); }
      .admin-table { font-size: 0.8rem; }
      .admin-table th, .admin-table td { padding: 8px 6px; }
      .filter-bar { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- ── Auth Screen ── -->
<div id="auth-screen">
  <div class="auth-container">
    <div class="auth-header">
      <h2>SEM 예약 시스템</h2>
      <p>Scanning Electron Microscope</p>
    </div>
    <div class="auth-tabs">
      <button class="active" onclick="switchTab('login')">로그인</button>
      <button onclick="switchTab('register')">회원가입</button>
    </div>

    <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="login-username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary">로그인</button>
    </form>

    <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="reg-username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="reg-password" required minlength="4" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="reg-name" required>
      </div>
      <div class="form-group">
        <label>핸드폰번호</label>
        <input type="tel" id="reg-phone" required placeholder="예: 010-1234-5678">
      </div>
      <div class="form-group">
        <label>지도교수</label>
        <input type="text" id="reg-advisor" required placeholder="예: 김철수">
      </div>
      <button type="submit" class="btn-primary">가입하기</button>
    </form>

    <div class="pending-msg" id="pending-msg">
      회원가입이 완료되었습니다.<br>
      관리자 승인 후 로그인할 수 있습니다.
    </div>
  </div>
</div>

<!-- ── App Screen ── -->
<div id="app-screen" style="display:none;">
  <header>
    <h1>SEM 예약 시스템</h1>
    <div class="user-info">
      <span id="user-display"></span>
      <div class="header-btns">
        <button class="header-btn active-tab" id="btn-calendar" onclick="showView('calendar')">예약 현황</button>
        <button class="header-btn" id="btn-admin" onclick="showView('admin')" style="display:none;">관리자</button>
        <button class="header-btn" onclick="handleLogout()">로그아웃</button>
      </div>
    </div>
  </header>

  <!-- ── Calendar View ── -->
  <div id="calendar-view" class="main-container">
    <div class="usage-card">
      <h3 id="usage-title">주간 사용량</h3>
      <div class="usage-bar-wrap">
        <div class="usage-bar" id="usage-bar" style="width:0%"></div>
        <span class="usage-text" id="usage-text">0 / 180분</span>
      </div>
      <div class="usage-detail" id="usage-detail"></div>
    </div>

    <div class="week-nav">
      <button onclick="changeWeek(-1)">&larr; 이전 주</button>
      <span class="week-label" id="week-label"></span>
      <button onclick="changeWeek(1)">다음 주 &rarr;</button>
    </div>

    <div class="calendar">
      <div class="calendar-header" id="cal-header"></div>
      <div class="calendar-body" id="cal-body"></div>
    </div>
  </div>

  <!-- ── Admin View ── -->
  <div id="admin-view" class="main-container admin-panel">
    <!-- Stats -->
    <div class="stat-cards" id="admin-stats"></div>

    <!-- Advisor Weekly Usage -->
    <div class="admin-section">
      <h3>교수별 이번 주 사용량</h3>
      <div class="advisor-usage-list" id="advisor-usage-list"></div>
    </div>

    <!-- Pending Users -->
    <div class="admin-section" id="pending-section">
      <h3>승인 대기 회원</h3>
      <table class="admin-table">
        <thead><tr><th>이름</th><th>아이디</th><th>연락처</th><th>지도교수</th><th>가입일</th><th>관리</th></tr></thead>
        <tbody id="pending-tbody"></tbody>
      </table>
    </div>

    <!-- All Users -->
    <div class="admin-section">
      <h3>전체 회원 목록</h3>
      <table class="admin-table">
        <thead><tr><th>이름</th><th>아이디</th><th>연락처</th><th>지도교수</th><th>상태</th><th>가입일</th><th>관리</th></tr></thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>

    <!-- All Reservations -->
    <div class="admin-section">
      <h3>전체 예약 내역</h3>
      <div class="filter-bar">
        <div class="form-group">
          <label>지도교수</label>
          <input type="text" id="filter-advisor" placeholder="전체">
        </div>
        <div class="form-group">
          <label>시작일</label>
          <input type="date" id="filter-from">
        </div>
        <div class="form-group">
          <label>종료일</label>
          <input type="date" id="filter-to">
        </div>
        <button class="btn-primary" onclick="loadAdminReservations()" style="height:42px;">검색</button>
      </div>
      <table class="admin-table">
        <thead><tr><th>날짜</th><th>시간</th><th>예약자</th><th>지도교수</th><th>목적</th><th>관리</th></tr></thead>
        <tbody id="reservations-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── New Reservation Modal ── -->
<div class="modal-overlay" id="new-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>예약 등록</h3>
      <button class="modal-close" onclick="closeModal('new-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <form onsubmit="handleNewReservation(event)">
        <div class="form-group">
          <label>날짜</label>
          <input type="date" id="new-date" required>
        </div>
        <div class="form-group">
          <label>시작 시간</label>
          <input type="time" id="new-start" required step="1800">
        </div>
        <div class="form-group">
          <label>종료 시간</label>
          <input type="time" id="new-end" required step="1800">
        </div>
        <div class="form-group">
          <label>사용 목적</label>
          <input type="text" id="new-purpose" placeholder="예: 배터리 양극재 표면 분석">
        </div>
        <button type="submit" class="btn-primary">예약하기</button>
      </form>
    </div>
  </div>
</div>

<!-- ── Detail Modal ── -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>예약 상세</h3>
      <button class="modal-close" onclick="closeModal('detail-modal')">&times;</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentUser = null;
let currentWeekStart = getMonday(new Date());
let reservations = [];

const HOUR_START = 0;
const HOUR_END = 24;
const DAYS = ['월', '화', '수', '목', '금', '토', '일'];

// ── Utilities ──
function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day === 0 ? -6 : 1);
  date.setDate(diff);
  return formatDate(date);
}

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return formatDate(d);
}

function getMaxReservationDate() {
  const d = new Date();
  d.setDate(d.getDate() + 14);
  return formatDate(d);
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '') + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function api(url, opts = {}) {
  const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '오류가 발생했습니다.');
  return data;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Auth ──
function switchTab(tab) {
  document.querySelectorAll('.auth-tabs button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  document.getElementById('pending-msg').style.display = 'none';
  if (tab === 'login') {
    document.querySelector('.auth-tabs button:first-child').classList.add('active');
    document.getElementById('login-form').classList.add('active');
  } else {
    document.querySelector('.auth-tabs button:last-child').classList.add('active');
    document.getElementById('register-form').classList.add('active');
  }
}

async function handleLogin(e) {
  e.preventDefault();
  try {
    const data = await api('/api/login', {
      method: 'POST',
      body: JSON.stringify({
        username: document.getElementById('login-username').value,
        password: document.getElementById('login-password').value
      })
    });
    currentUser = data.user;
    showApp();
  } catch (err) {
    showToast(err.message, true);
  }
}

async function handleRegister(e) {
  e.preventDefault();
  try {
    await api('/api/register', {
      method: 'POST',
      body: JSON.stringify({
        username: document.getElementById('reg-username').value,
        password: document.getElementById('reg-password').value,
        name: document.getElementById('reg-name').value,
        phone: document.getElementById('reg-phone').value,
        advisor: document.getElementById('reg-advisor').value
      })
    });
    // Show pending message
    document.getElementById('register-form').classList.remove('active');
    document.getElementById('pending-msg').style.display = 'block';
  } catch (err) {
    showToast(err.message, true);
  }
}

async function handleLogout() {
  await api('/api/logout', { method: 'POST' });
  currentUser = null;
  document.getElementById('auth-screen').style.display = '';
  document.getElementById('app-screen').style.display = 'none';
}

async function checkSession() {
  try {
    currentUser = await api('/api/me');
    showApp();
  } catch {}
}

// ── View Switching ──
function showView(view) {
  document.getElementById('calendar-view').style.display = view === 'calendar' ? '' : 'none';
  const adminEl = document.getElementById('admin-view');
  if (view === 'admin') adminEl.classList.add('visible');
  else adminEl.classList.remove('visible');
  document.getElementById('btn-calendar').classList.toggle('active-tab', view === 'calendar');
  document.getElementById('btn-admin').classList.toggle('active-tab', view === 'admin');

  if (view === 'admin') loadAdminData();
}

// ── App ──
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = '';

  const isAdmin = currentUser.role === 'admin';
  document.getElementById('btn-admin').style.display = isAdmin ? '' : 'none';
  document.getElementById('user-display').textContent =
    isAdmin ? `${currentUser.name} (관리자)` : `${currentUser.name} (${currentUser.advisor} 교수님)`;

  showView('calendar');
  renderCalendar();
  loadReservations();
  if (!isAdmin) loadUsage();
  else document.querySelector('.usage-card').style.display = 'none';
}

function changeWeek(dir) {
  currentWeekStart = addDays(currentWeekStart, dir * 7);
  renderCalendar();
  loadReservations();
  if (currentUser.role !== 'admin') loadUsage();
}

async function loadUsage() {
  try {
    const data = await api(`/api/advisor-usage?advisor=${encodeURIComponent(currentUser.advisor)}&week_start=${currentWeekStart}`);
    const pct = Math.round((data.used_minutes / data.limit_minutes) * 100);
    const bar = document.getElementById('usage-bar');
    bar.style.width = pct + '%';
    bar.className = 'usage-bar' + (pct >= 90 ? ' danger' : pct >= 60 ? ' warning' : '');
    document.getElementById('usage-text').textContent = `${data.used_minutes}분 / ${data.limit_minutes}분 (${pct}%)`;
    document.getElementById('usage-title').textContent = `${currentUser.advisor} 교수님 연구실 - 주간 SEM 사용량`;
    document.getElementById('usage-detail').textContent = `잔여: ${data.remaining_minutes}분`;
    document.querySelector('.usage-card').style.display = '';
  } catch {}
}

async function loadReservations() {
  try {
    reservations = await api(`/api/reservations?week_start=${currentWeekStart}`);
    renderReservations();
  } catch {}
}

// ── Calendar ──
function renderCalendar() {
  const today = formatDate(new Date());
  const header = document.getElementById('cal-header');
  header.innerHTML = '<div></div>';
  for (let i = 0; i < 7; i++) {
    const dateStr = addDays(currentWeekStart, i);
    const d = new Date(dateStr + 'T00:00:00');
    header.innerHTML += `<div>${DAYS[i]}<div class="date-num">${d.getMonth()+1}/${d.getDate()}</div></div>`;
  }
  document.getElementById('week-label').textContent = `${currentWeekStart} ~ ${addDays(currentWeekStart, 6)}`;

  const body = document.getElementById('cal-body');
  body.innerHTML = '';
  for (let h = HOUR_START; h < HOUR_END; h++) {
    const timeStr = String(h).padStart(2, '0') + ':00';
    body.innerHTML += `<div class="time-label">${timeStr}</div>`;
    for (let d = 0; d < 7; d++) {
      const dateStr = addDays(currentWeekStart, d);
      const isToday = dateStr === today;
      body.innerHTML += `<div class="calendar-cell${isToday ? ' today' : ''}"
        data-date="${dateStr}" data-hour="${h}"
        onclick="openNewModal('${dateStr}', '${timeStr}')"></div>`;
    }
  }
}

function renderReservations() {
  document.querySelectorAll('.reservation-block').forEach(el => el.remove());
  reservations.forEach(r => {
    const [sh, sm] = r.start_time.split(':').map(Number);
    const [eh, em] = r.end_time.split(':').map(Number);
    if (sh < HOUR_START || sh >= HOUR_END) return;
    const cells = document.querySelectorAll(`.calendar-cell[data-date="${r.date}"][data-hour="${sh}"]`);
    if (!cells.length) return;

    const durationMin = (eh * 60 + em) - (sh * 60 + sm);
    const heightPx = (durationMin / 60) * 48;
    const topPx = (sm / 60) * 48;
    const isMine = currentUser && r.user_id === currentUser.id;

    const block = document.createElement('div');
    block.className = 'reservation-block' + (isMine ? ' mine' : '');
    block.style.top = topPx + 'px';
    block.style.height = Math.max(heightPx - 2, 14) + 'px';
    block.textContent = `${r.user_name} ${r.start_time}-${r.end_time}`;
    block.onclick = (e) => { e.stopPropagation(); showDetail(r); };
    cells[0].appendChild(block);
  });
}

// ── Modals ──
function openNewModal(date, time) {
  // Enforce 2-week limit on date picker
  const today = formatDate(new Date());
  const maxDate = getMaxReservationDate();
  const dateInput = document.getElementById('new-date');
  dateInput.value = date;
  dateInput.min = today;
  dateInput.max = maxDate;

  document.getElementById('new-start').value = time;
  const [h] = time.split(':').map(Number);
  document.getElementById('new-end').value = String(Math.min(h + 1, HOUR_END)).padStart(2, '0') + ':00';
  document.getElementById('new-purpose').value = '';
  document.getElementById('new-modal').classList.add('active');
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

async function handleNewReservation(e) {
  e.preventDefault();
  try {
    await api('/api/reservations', {
      method: 'POST',
      body: JSON.stringify({
        date: document.getElementById('new-date').value,
        start_time: document.getElementById('new-start').value,
        end_time: document.getElementById('new-end').value,
        purpose: document.getElementById('new-purpose').value
      })
    });
    closeModal('new-modal');
    showToast('예약이 완료되었습니다.');
    loadReservations();
    if (currentUser.role !== 'admin') loadUsage();
  } catch (err) {
    showToast(err.message, true);
  }
}

function showDetail(r) {
  const isMine = currentUser && r.user_id === currentUser.id;
  const isAdmin = currentUser && currentUser.role === 'admin';
  const body = document.getElementById('detail-body');
  body.innerHTML = `
    <div class="detail-info"><label>예약자</label><p>${escapeHtml(r.user_name)}</p></div>
    <div class="detail-info"><label>지도교수</label><p>${escapeHtml(r.advisor)}</p></div>
    <div class="detail-info"><label>날짜</label><p>${r.date}</p></div>
    <div class="detail-info"><label>시간</label><p>${r.start_time} ~ ${r.end_time}</p></div>
    <div class="detail-info"><label>목적</label><p>${escapeHtml(r.purpose || '-')}</p></div>
    ${isMine ? `<button class="btn-danger" onclick="cancelReservation(${r.id}, false)">예약 취소</button>` : ''}
    ${isAdmin && !isMine ? `<button class="btn-danger" onclick="cancelReservation(${r.id}, true)">관리자 삭제</button>` : ''}
  `;
  document.getElementById('detail-modal').classList.add('active');
}

async function cancelReservation(id, isAdmin) {
  if (!confirm('예약을 취소하시겠습니까?')) return;
  try {
    const url = isAdmin ? `/api/admin/reservations/${id}` : `/api/reservations/${id}`;
    await api(url, { method: 'DELETE' });
    closeModal('detail-modal');
    showToast('예약이 취소되었습니다.');
    loadReservations();
    if (currentUser.role !== 'admin') loadUsage();
  } catch (err) {
    showToast(err.message, true);
  }
}

// ── Admin Panel ──
async function loadAdminData() {
  await Promise.all([loadAdminStats(), loadAdminUsers(), loadAdminReservations()]);
}

async function loadAdminStats() {
  try {
    const s = await api('/api/admin/stats');
    document.getElementById('admin-stats').innerHTML = `
      <div class="stat-card"><div class="stat-num">${s.totalUsers}</div><div class="stat-label">전체 회원</div></div>
      <div class="stat-card ${s.pendingUsers > 0 ? 'alert' : ''}"><div class="stat-num">${s.pendingUsers}</div><div class="stat-label">승인 대기</div></div>
      <div class="stat-card"><div class="stat-num">${s.totalReservations}</div><div class="stat-label">전체 예약</div></div>
      <div class="stat-card"><div class="stat-num">${s.todayReservations}</div><div class="stat-label">오늘 예약</div></div>
    `;

    const list = document.getElementById('advisor-usage-list');
    if (s.advisorUsage.length === 0) {
      list.innerHTML = '<div style="color:#999; font-size:0.9rem;">이번 주 예약 없음</div>';
    } else {
      list.innerHTML = s.advisorUsage.map(a => {
        const pct = Math.round((a.total_minutes / 180) * 100);
        const cls = pct >= 90 ? 'danger' : pct >= 60 ? 'warning' : '';
        return `<div class="advisor-usage-item">
          <span class="advisor-name">${escapeHtml(a.advisor)}</span>
          <div class="usage-bar-wrap"><div class="usage-bar ${cls}" style="width:${Math.min(pct,100)}%"></div></div>
          <span class="usage-bar-label">${a.total_minutes}분 / 180분</span>
        </div>`;
      }).join('');
    }
  } catch {}
}

async function loadAdminUsers() {
  try {
    const users = await api('/api/admin/users');
    const pending = users.filter(u => !u.approved);
    const pendingSection = document.getElementById('pending-section');

    if (pending.length === 0) {
      document.getElementById('pending-tbody').innerHTML =
        '<tr><td colspan="6" style="text-align:center; color:#999;">승인 대기 중인 회원이 없습니다.</td></tr>';
    } else {
      document.getElementById('pending-tbody').innerHTML = pending.map(u => `
        <tr>
          <td>${escapeHtml(u.name)}</td>
          <td>${escapeHtml(u.username)}</td>
          <td>${escapeHtml(u.phone || '-')}</td>
          <td>${escapeHtml(u.advisor)}</td>
          <td>${u.created_at ? u.created_at.split(' ')[0] : ''}</td>
          <td>
            <button class="btn-sm btn-approve" onclick="approveUser(${u.id})">승인</button>
            <button class="btn-sm btn-reject" onclick="rejectUser(${u.id}, '${escapeHtml(u.name)}')">거절</button>
          </td>
        </tr>
      `).join('');
    }

    document.getElementById('users-tbody').innerHTML = users.map(u => {
      const badge = u.role === 'admin' ? '<span class="badge badge-admin">관리자</span>'
        : u.approved ? '<span class="badge badge-approved">승인됨</span>'
        : '<span class="badge badge-pending">대기중</span>';
      const actions = u.role === 'admin' ? '-' :
        (!u.approved ? `<button class="btn-sm btn-approve" onclick="approveUser(${u.id})">승인</button>` : '') +
        `<button class="btn-sm btn-reject" onclick="rejectUser(${u.id}, '${escapeHtml(u.name)}')">삭제</button>`;
      return `<tr>
        <td>${escapeHtml(u.name)}</td>
        <td>${escapeHtml(u.username)}</td>
        <td>${escapeHtml(u.phone || '-')}</td>
        <td>${escapeHtml(u.advisor)}</td>
        <td>${badge}</td>
        <td>${u.created_at ? u.created_at.split(' ')[0] : ''}</td>
        <td>${actions}</td>
      </tr>`;
    }).join('');
  } catch {}
}

async function loadAdminReservations() {
  try {
    const params = new URLSearchParams();
    const advisor = document.getElementById('filter-advisor').value;
    const from = document.getElementById('filter-from').value;
    const to = document.getElementById('filter-to').value;
    if (advisor) params.set('advisor', advisor);
    if (from) params.set('date_from', from);
    if (to) params.set('date_to', to);

    const rows = await api(`/api/admin/reservations?${params}`);
    if (rows.length === 0) {
      document.getElementById('reservations-tbody').innerHTML =
        '<tr><td colspan="6" style="text-align:center; color:#999;">예약 내역이 없습니다.</td></tr>';
    } else {
      document.getElementById('reservations-tbody').innerHTML = rows.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${r.start_time} ~ ${r.end_time}</td>
          <td>${escapeHtml(r.user_name)}</td>
          <td>${escapeHtml(r.advisor)}</td>
          <td>${escapeHtml(r.purpose || '-')}</td>
          <td><button class="btn-sm btn-delete-res" onclick="adminDeleteReservation(${r.id})">삭제</button></td>
        </tr>
      `).join('');
    }
  } catch {}
}

async function approveUser(id) {
  try {
    await api(`/api/admin/users/${id}/approve`, { method: 'POST' });
    showToast('회원이 승인되었습니다.');
    loadAdminData();
  } catch (err) { showToast(err.message, true); }
}

async function rejectUser(id, name) {
  if (!confirm(`${name} 회원을 삭제하시겠습니까? 관련 예약도 함께 삭제됩니다.`)) return;
  try {
    await api(`/api/admin/users/${id}/reject`, { method: 'POST' });
    showToast('회원이 삭제되었습니다.');
    loadAdminData();
  } catch (err) { showToast(err.message, true); }
}

async function adminDeleteReservation(id) {
  if (!confirm('이 예약을 삭제하시겠습니까?')) return;
  try {
    await api(`/api/admin/reservations/${id}`, { method: 'DELETE' });
    showToast('예약이 삭제되었습니다.');
    loadAdminReservations();
    loadAdminStats();
  } catch (err) { showToast(err.message, true); }
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('active');
  });
});

// Init
checkSession();
</script>
